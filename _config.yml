# Site
name: "niee"
title: "niee의 잡다한 공간입니다."
description: "웹/앱 개발, 디자인 패턴, 리팩토링, Spring, Python, Docker, Angular 등 실무에서 정리한 개발 노트를 공유하는 블로그입니다."
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
url: "https://parkminkyu.github.io"
baseurl: ""
google_analytics: 'G-JS664Z0C00'
disqus: 'parkminkyu-github-io'
#mailchimp-list: 'https://wowthemes.us11.list-manage.com/subscribe/post?u=8aeb20a530e124561927d3bd8&amp;id=8c3d2d214b'
include: ["_pages", ".well-known"]
permalink: /:title/
email: smartmingue@gmail.com

# Authors
authors:
  niee:
    name: ParkMinKyu
    display_name: niee
    email: smartmingue@gmail.com
    web: https://parkminkyu.github.io/
    description: "직업은 웹 개발 취미는 앱개발"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-figure
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination
paginate: 6
paginate_path: /page:num/

# Front matter defaults (so new posts only need `title:`)
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "niee"
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "page"
    
# Other
highlighter: none
markdown: kramdown
kramdown:
   syntax_highlighter_opts:
      disable : true



# Adsense
adsense: "enabled"
adsense-data-ad-client: "ca-pub-3052941804343536"
adsense-data-ad-slot: "3846604846"

# Sass
sass:
  style: compressed

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock, docker-compose.yml]
